buildscript {
  def reactNativeVersion = rootProject.hasProperty('reactNativeVersion') ? rootProject.property('reactNativeVersion') : "0.72.7"
  ext {
    compileSdkVersion = 34
    targetSdkVersion = 34
    minSdkVersion = 23
    buildToolsVersion = "34.0.0"
    kotlinVersion = rootProject.ext.has('kotlinVersion') ? rootProject.ext.get('kotlinVersion') : '1.9.0'
  }
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath "com.android.tools.build:gradle:8.1.1"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
  }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
  namespace "expo.modules.veepoo"
  compileSdk rootProject.ext.compileSdkVersion

  defaultConfig {
    minSdkVersion rootProject.ext.minSdkVersion
    targetSdkVersion rootProject.ext.targetSdkVersion
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = '17'
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    abortOnError false
  }

  sourceSets {
    main {
      java {
        srcDirs = ['src/main/java', 'src/main/kotlin']
      }
    }
  }
}

repositories {
  google()
  mavenCentral()
  flatDir {
    dirs 'libs'
  }
}

dependencies {
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion"
  implementation "com.facebook.react:react-native:+"
  
  // Expo Modules Core
  implementation 'expo.modules:expo-modules-core:1.5.0'

  // Local SDK dependencies from android/libs
  implementation(name: 'vpprotocol-2.3.37.15', ext: 'aar')
  implementation(name: 'vpbluetooth-1.18', ext: 'aar')
  implementation(name: 'libfastdfu-0.5', ext: 'aar')
  implementation(name: 'libdfu-1.5', ext: 'aar')
  implementation(name: 'libble-0.5', ext: 'aar')
  implementation files('libcomx-0.5.jar')
  implementation(name: 'jl_rcsp_V0.7.2_527-release', ext: 'aar')
  implementation(name: 'jl_bt_ota_V1.10.0_10931-release', ext: 'aar')
  implementation(name: 'abpartool-release', ext: 'aar')
  implementation(name: 'JL_Watch_V1.13.1_11214-release', ext: 'aar')
  implementation(name: 'BmpConvert_V1.6.0_10604-release', ext: 'aar')
  implementation files('AMap2DMap_6.0.0_AMapSearch_9.4.5_AMapLocation_6.2.0_20221026.jar')
}
