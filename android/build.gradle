apply plugin: 'com.android.library'

group = 'expo.modules.veepoo'
version = '1.0.0'

def expoModulesCorePlugin = new File(project(":expo-modules-core").projectDir.absolutePath, "ExpoModulesCorePlugin.gradle")
apply from: expoModulesCorePlugin
applyKotlinExpoModulesCorePlugin()
useCoreDependencies()
useDefaultAndroidSdkVersions()

android {
  namespace "expo.modules.veepoo"

  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }

  lint {
    abortOnError false
  }
}

dependencies {
  implementation "com.google.code.gson:gson:2.10.1"

  // AAR 子项目引用 - 使用正确的项目名称格式
  implementation project(':gaozh1024-expo-veepoo-sdk$abpartool')
  implementation project(':gaozh1024-expo-veepoo-sdk$bmpconvert')
  implementation project(':gaozh1024-expo-veepoo-sdk$jl-bt-ota')
  implementation project(':gaozh1024-expo-veepoo-sdk$jl-rcsp')
  implementation project(':gaozh1024-expo-veepoo-sdk$jl-watch')
  implementation project(':gaozh1024-expo-veepoo-sdk$libble')
  implementation project(':gaozh1024-expo-veepoo-sdk$libdfu')
  implementation project(':gaozh1024-expo-veepoo-sdk$libfastdfu')
  implementation project(':gaozh1024-expo-veepoo-sdk$vpbluetooth')
  implementation project(':gaozh1024-expo-veepoo-sdk$vpprotocol')

  // JAR files
  implementation fileTree(dir: "${project.projectDir}/libs", include: ['*.jar'])

  // React Native dependencies
  compileOnly "com.facebook.react:react-native:+"
}
